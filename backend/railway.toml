[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "alembic upgrade head 2>&1 && echo 'Alembic OK, starting uvicorn on port '\"$PORT\" && uvicorn app.main:app --host 0.0.0.0 --port $PORT 2>&1"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
